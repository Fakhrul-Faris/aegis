# Fly.io worker app: collector + Telegram bot + forex + intraday paper.
# Deploy:    fly deploy -a aegis-collector
# Secrets:   fly secrets set TELEGRAM_BOT_TOKEN=... TELEGRAM_CHAT_ID=...
# Volume:    fly volumes create aegis_data --size 1   (SQLite + logs live here)

app = "aegis-collector"
primary_region = "sin" # Singapore - closest region to Malaysia

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "aegis_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[restart]]
  policy = "always"
